{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Simulador de Plan de Ahorro{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/common.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar-custom">
        <div class="navbar-inner">
            <a href="{% url 'index' %}">
                <img src="{% static 'img/logo.png' %}" alt="Logo" class="navbar-logo">
            </a>
            <a href="{% url 'admin:index' %}" class="navbar-hamburger" id="menuToggle" aria-label="Panel de administración">
                &#9776;
            </a>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <!-- Footer -->
    <footer class="footer-uces">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-4">
                    <img src="{% static 'img/logo.png' %}" alt="Logo" height="40">
                </div>
                <div class="col-md-4 text-center copyright-text">
                    &copy; 2026 R. Marcos Morales | Todos los derechos reservados
                </div>
                <div class="col-md-4 text-end social-links">
                    <a href="#" class="me-3">INSTAGRAM</a>
                    <a href="#">WHATSAPP</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
